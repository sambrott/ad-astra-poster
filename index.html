<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Ad Astra — poster (loss of signal)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <aside class="layout-tuner" id="layout-tuner" aria-label="Layout tuning">
      <h2 class="layout-tuner__title">Animation box &amp; type</h2>
      <div class="layout-tuner__field">
        <div class="layout-tuner__label">
          <span>Left / right (in ↔ out)</span>
          <span class="layout-tuner__value" id="tune-stage-x-val">2</span>
        </div>
        <input
          id="tune-stage-x"
          type="range"
          min="0.5"
          max="2"
          step="0.02"
          value="2"
          aria-label="Animation box horizontal inset"
        />
      </div>
      <div class="layout-tuner__field">
        <div class="layout-tuner__label">
          <span>Top (in ↔ out)</span>
          <span class="layout-tuner__value" id="tune-stage-top-val">1.84</span>
        </div>
        <input
          id="tune-stage-top"
          type="range"
          min="0.5"
          max="2"
          step="0.02"
          value="1.84"
          aria-label="Animation box top inset"
        />
      </div>
      <div class="layout-tuner__field">
        <div class="layout-tuner__label">
          <span>Bottom (in ↔ out)</span>
          <span class="layout-tuner__value" id="tune-stage-bottom-val">0.5</span>
        </div>
        <input
          id="tune-stage-bottom"
          type="range"
          min="0.5"
          max="2"
          step="0.02"
          value="0.5"
          aria-label="Animation box bottom inset"
        />
        <p class="layout-tuner__mirror" id="tune-stage-mirror" aria-live="polite"></p>
      </div>
      <div class="layout-tuner__field">
        <div class="layout-tuner__label">
          <span>Astronaut end (px)</span>
          <span class="layout-tuner__value" id="tune-astronaut-val">0</span>
        </div>
        <input
          id="tune-astronaut"
          type="range"
          min="0"
          max="1500"
          step="5"
          value="0"
          aria-label="Astronaut end position nudge"
        />
        <p class="layout-tuner__mirror" id="tune-astronaut-mirror" aria-live="polite"></p>
      </div>
      <div class="layout-tuner__field">
        <div class="layout-tuner__label">
          <span>Type size</span>
          <span class="layout-tuner__value" id="tune-type-val">1.18</span>
        </div>
        <input
          id="tune-type"
          type="range"
          min="0.5"
          max="2.2"
          step="0.01"
          value="1.18"
          aria-label="Wormhole type scale"
        />
        <p class="layout-tuner__mirror" id="tune-type-mirror" aria-live="polite"></p>
      </div>
      <div class="layout-tuner__export-block">
        <div class="layout-tuner__export-row">
          <span class="layout-tuner__export-label">Copy for handoff</span>
          <button type="button" class="layout-tuner__copy" id="tune-copy-export">
            Copy JSON
          </button>
        </div>
        <textarea
          id="tune-export-json"
          class="layout-tuner__export"
          readonly
          rows="8"
          spellcheck="false"
          aria-label="Exported layout JSON"
        ></textarea>
      </div>
    </aside>
    <div class="poster-page">
      <div class="poster-frame">
        <!-- 27×40 in layout (8100×12000 JPEG); scales down if the viewport is smaller -->
        <figure class="poster" aria-label="Ad Astra one-sheet">
          <div class="poster__bg" role="presentation"></div>
          <div class="poster__stage">
            <black-hole>
              <canvas class="js-canvas-back" aria-hidden="true"></canvas>
              <canvas class="js-canvas-front" aria-hidden="true"></canvas>
            </black-hole>
            <div class="astronaut-float" aria-hidden="true">
              <div class="astronaut-float__depth">
                <img
                  class="astronaut-float__img"
                  src="images/astronaut.png"
                  alt=""
                  decoding="async"
                  fetchpriority="high"
                  width="378"
                  height="426"
                  onerror="this.onerror=null;this.src='images/astronaut.svg'"
                />
              </div>
            </div>
          </div>
        </figure>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
